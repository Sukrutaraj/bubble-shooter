<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Shooter</title>
<style>
  body { margin:0; background:#0f172a; display:flex; justify-content:center; align-items:center; height:100vh; }
  canvas { background:#020617; border-radius:20px; }
</style>
</head>
<body>

<canvas id="game" width="360" height="600"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const radius = 15;
const cols = 10;
const rows = 12;

const colors = ['#ef4444','#22c55e','#3b82f6','#eab308','#a855f7'];

let grid = [];
let fallingBubbles = [];

// 🔊 LJUD
const shootSound = new Audio('https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg');
const popSound = new Audio('https://actions.google.com/sounds/v1/cartoon/pop.ogg');
const fallSound = new Audio('https://actions.google.com/sounds/v1/cartoon/slide_whistle_to_drum_hit.ogg');

function play(sound){
  sound.currentTime = 0;
  sound.play().catch(()=>{});
}

function randomColor(){
  return colors[Math.floor(Math.random()*colors.length)];
}

function initGrid(){
  for(let r=0;r<rows;r++){
    grid[r]=[];
    for(let c=0;c<cols;c++){
      grid[r][c] = r<6 ? randomColor() : null;
    }
  }
}

function getX(c,r){
  let offset = (r % 2) * radius;
  return c * radius * 2 + radius + offset;
}

function getY(r){
  return r * radius * 1.7 + radius;
}

let shooter = {
  x: canvas.width/2,
  y: canvas.height-40,
  angle: -Math.PI/2,
  color: randomColor()
};

let projectile = null;
let nextBall = randomColor();

canvas.addEventListener('mousemove',(e)=>{
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  shooter.angle = Math.atan2(my-shooter.y, mx-shooter.x);
});

canvas.addEventListener('click',()=>{
  if(!projectile){
    play(shootSound);

    projectile = {
      x: shooter.x,
      y: shooter.y,
      dx: Math.cos(shooter.angle)*5,
      dy: Math.sin(shooter.angle)*5,
      color: shooter.color
    };

    shooter.color = nextBall;
    nextBall = randomColor();
  }
});

function update(){

  if(projectile){

    projectile.x += projectile.dx;
    projectile.y += projectile.dy;

    if(projectile.x < radius || projectile.x > canvas.width-radius){
      projectile.dx *= -1;
    }

    if(projectile.y < radius){
      snapProjectile(projectile);
      projectile = null;
      return;
    }

    let hit = false;

    for(let r=0;r<rows && !hit;r++){
      for(let c=0;c<cols && !hit;c++){

        if(grid[r][c]){

          const bx = getX(c,r);
          const by = getY(r);
          const dist = Math.hypot(projectile.x-bx, projectile.y-by);

          if(dist < radius*2 - 2){
            snapProjectile(projectile);
            projectile = null;
            hit = true;
          }
        }
      }
    }

    if(hit) return;
  }

  fallingBubbles.forEach(b => {
    b.y += b.vy;
    b.vy += 0.3;
  });

  fallingBubbles = fallingBubbles.filter(b => b.y < canvas.height + 50);
}

function snapProjectile(p){

  if(!p) return;

  let best = {dist: Infinity, r:0, c:0};

  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){

      const x = getX(c,r);
      const y = getY(r);
      const d = Math.hypot(p.x-x, p.y-y);

      if(d < best.dist){
        best = {dist:d, r, c};
      }
    }
  }

  let r = best.r;
  let c = best.c;

  while(r>=0 && grid[r][c] !== null){
    r--;
  }

  if(r < 0) r = 0;

  grid[r][c] = p.color;
  removeMatches(r,c,p.color);
}

function getNeighbors(r,c){
  if(r % 2 === 0){
    return [[r,c-1],[r,c+1],[r-1,c-1],[r-1,c],[r+1,c-1],[r+1,c]];
  } else {
    return [[r,c-1],[r,c+1],[r-1,c],[r-1,c+1],[r+1,c],[r+1,c+1]];
  }
}

function removeMatches(r,c,color){

  let visited = new Set();
  let stack = [[r,c]];
  let matches = [];

  while(stack.length){

    let [cr,cc] = stack.pop();

    if(cr<0||cr>=rows||cc<0||cc>=cols) continue;

    let key = cr+','+cc;
    if(visited.has(key)) continue;
    visited.add(key);

    if(grid[cr] && grid[cr][cc] === color){
      matches.push([cr,cc]);
      getNeighbors(cr,cc).forEach(n=>stack.push(n));
    }
  }

  if(matches.length>=3){

    play(popSound);

    matches.forEach(([rr,cc])=>{
      grid[rr][cc] = null;
    });

    applyGravity();
  }
}

function applyGravity(){

  let visited = new Set();

  function mark(r,c){

    let stack=[[r,c]];

    while(stack.length){

      let [cr,cc]=stack.pop();

      if(cr<0||cr>=rows||cc<0||cc>=cols) continue;

      let key=cr+','+cc;
      if(visited.has(key)) continue;
      if(!grid[cr][cc]) continue;

      visited.add(key);

      getNeighbors(cr,cc).forEach(n=>stack.push(n));
    }
  }

  for(let c=0;c<cols;c++){
    if(grid[0][c]) mark(0,c);
  }

  let didFall = false;

  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){

      if(grid[r][c]){

        let key=r+','+c;

        if(!visited.has(key)){

          fallingBubbles.push({
            x: getX(c,r),
            y: getY(r),
            color: grid[r][c],
            vy: 2
          });

          grid[r][c]=null;
          didFall = true;
        }
      }
    }
  }

  if(didFall) play(fallSound);
}

function drawGrid(){
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      if(grid[r][c]){
        ctx.beginPath();
        ctx.arc(getX(c,r), getY(r), radius,0,Math.PI*2);
        ctx.fillStyle = grid[r][c];
        ctx.fill();
      }
    }
  }
}

function drawFalling(){
  fallingBubbles.forEach(b=>{
    ctx.beginPath();
    ctx.arc(b.x, b.y, radius,0,Math.PI*2);
    ctx.fillStyle = b.color;
    ctx.fill();
  });
}

function drawShooter(){
  ctx.beginPath();
  ctx.arc(shooter.x, shooter.y, radius,0,Math.PI*2);
  ctx.fillStyle = shooter.color;
  ctx.fill();

  ctx.beginPath();
  ctx.arc(shooter.x + 40, shooter.y, radius*0.7,0,Math.PI*2);
  ctx.fillStyle = nextBall;
  ctx.fill();
}

function drawProjectile(){
  if(!projectile) return;

  ctx.beginPath();
  ctx.arc(projectile.x, projectile.y, radius,0,Math.PI*2);
  ctx.fillStyle = projectile.color;
  ctx.fill();
}

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  update();
  drawGrid();
  drawFalling();
  drawShooter();
  drawProjectile();
  requestAnimationFrame(loop);
}

initGrid();
loop();
</script>

</body>
</html>
